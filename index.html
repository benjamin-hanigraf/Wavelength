<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelength</title>

<style>
body {
  margin:0;
  background:#A9B3B9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

svg {
  width:350px;
}

/* pointer */
#pointer {
  transform-origin: 175px 175px;
  cursor: grab;
}

</style>
</head>

<body>

<svg viewBox="0 0 350 350">

  <!-- scalloped outer (fake using stroke) -->
  <circle cx="175" cy="175" r="165" fill="#EDEDED"/>

  <!-- navy ring -->
  <circle cx="175" cy="175" r="150" fill="none" stroke="#0B1140" stroke-width="20"/>

  <!-- white top -->
  <path d="M25 175 A150 150 0 0 1 325 175 L175 175 Z" fill="#F4F4F4"/>

  <!-- dark bottom -->
  <path d="M25 175 A150 150 0 0 0 325 175 L175 175 Z" fill="#060D3A"/>

  <!-- WEDGES (left side only) -->
  <path d="M175 175 L40 150 A150 150 0 0 1 60 120 Z" fill="#F97316"/>
  <path d="M175 175 L60 120 A150 150 0 0 1 80 100 Z" fill="#60A5FA"/>
  <path d="M175 175 L80 100 A150 150 0 0 1 105 90 Z" fill="#F97316"/>
  <path d="M175 175 L105 90 A150 150 0 0 1 130 95 Z" fill="#FBBF24"/>

  <!-- numbers -->
  <text x="55" y="150" font-size="14" fill="black" transform="rotate(-20 55 150)">3</text>
  <text x="75" y="120" font-size="14" fill="black" transform="rotate(-35 75 120)">4</text>
  <text x="95" y="100" font-size="14" fill="black" transform="rotate(-45 95 100)">3</text>
  <text x="115" y="95" font-size="14" fill="black" transform="rotate(-60 115 95)">2</text>

  <!-- center knob -->
  <circle cx="175" cy="175" r="30" fill="#D61F2C"/>

  <!-- pointer -->
  <line id="pointer" x1="175" y1="175" x2="190" y2="70"
        stroke="#D61F2C" stroke-width="6" stroke-linecap="round"/>

</svg>

<script>
let pointer = document.getElementById("pointer");
let angle = 20;
let dragging = false;

function setAngle(a){
  pointer.setAttribute("transform", `rotate(${a} 175 175)`);
}

setAngle(angle);

// drag
document.addEventListener("mousedown", ()=> dragging = true);
document.addEventListener("mouseup", ()=> dragging = false);

document.addEventListener("mousemove", (e)=>{
  if(!dragging) return;

  let rect = document.querySelector("svg").getBoundingClientRect();
  let cx = rect.left + rect.width/2;
  let cy = rect.top + rect.height/2;

  let dx = e.clientX - cx;
  let dy = e.clientY - cy;

  let a = Math.atan2(dy, dx) * 180/Math.PI + 90;
  a = Math.max(0, Math.min(180, a));

  setAngle(a);
});
</script>

</body>
</html>
